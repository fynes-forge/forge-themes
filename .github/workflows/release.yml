name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate theme JSON files
        run: npm run generate

      - name: Package extension
        run: npx vsce package --no-dependencies --out forge-themes-${{ github.ref_name }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Forge Themes ${{ github.ref_name }}
          body: |
            ## Forge Themes ${{ github.ref_name }}

            ### Themes included
            - 🔩 **Forge** — canonical brand dark theme
            - ☀️ **Dayforge** — light variant
            - 🔥 **Hearthforge** — warm dark variant
            - ⚔️ **Cold Forge** — high-contrast dark variant

            ### Install
            Download the `.vsix` below, then in VS Code:
            **Extensions** → `...` → **Install from VSIX**
          files: forge-themes-${{ github.ref_name }}.vsix
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
