name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate theme JSON files
        run: npm run generate

      - name: Validate generated themes exist
        run: |
          for f in \
            themes/forge-color-theme.json \
            themes/dayforge-color-theme.json \
            themes/hearthforge-color-theme.json \
            themes/cold-forge-color-theme.json; do
            [ -f "$f" ] && echo "✔  $f" || (echo "✘  Missing: $f" && exit 1)
          done

      - name: Validate theme JSON is well-formed
        run: |
          for f in themes/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" \
              && echo "✔  $f is valid JSON" \
              || (echo "✘  Invalid JSON: $f" && exit 1)
          done

      - name: Check extension packages cleanly
        run: npx vsce package --no-dependencies --out /tmp/test.vsix
